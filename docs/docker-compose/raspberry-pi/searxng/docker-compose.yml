services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    ports:
      - "8070:8080"
    volumes:
      - ./searxng:/etc/searxng
      - ./searxng/settings.yml:/etc/searxng/settings.yml
      # Optional: custom logo
      # - ./logo/searxng.png:/usr/local/searxng/searx/static/themes/simple/img/searxng.png
    environment:
      - SEARXNG_BASE_URL=https://search.benthem.es/
      - UWSGI_WORKERS=4
      - UWSGI_THREADS=4
    networks:
      - searxng

  redis:
    image: valkey/valkey:8-alpine
    container_name: redis
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - valkey-data:/data
    networks:
      - searxng

networks:
  searxng:
    name: searxng_searxng

volumes:
  valkey-data: