services:
  n8n:
    image: n8nio/n8n:latest
    networks:
      - bolex-net
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-YOUR_POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-YOUR_POSTGRES_PASSWORD}
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,qs
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-YOUR_N8N_ENCRYPTION_KEY}
      - N8N_USER_MANAGEMENT_JWT_SECRET=${N8N_USER_MANAGEMENT_JWT_SECRET:-YOUR_JWT_SECRET}
      - N8N_TEMPLATES_ENABLED=false
    restart: unless-stopped
    container_name: n8n
    ports:
      - 5678:5678
    volumes:
      - ./n8n_storage:/home/node/.n8n
      - ./backup:/backup
      - ./shared:/data/shared

networks:
  bolex-net:
    external: true

volumes:
  n8n_storage:
    name: n8n_storage
