model_list:
  # Ollama Models (Local)
  - model_name: llama3.1
    litellm_params:
      model: ollama/llama3.1
      api_base: os.environ/OLLAMA_API_BASE
  
  - model_name: llama3.1:8b
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: os.environ/OLLAMA_API_BASE
  
  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_base: os.environ/OLLAMA_API_BASE

  # OpenAI Models (via API)
  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: os.environ/OPENAI_API_KEY
      rpm: 480
      timeout: 300
      stream_timeout: 60

  - model_name: gpt-4
    litellm_params:
      model: openai/gpt-4
      api_key: os.environ/OPENAI_API_KEY
      rpm: 200
      timeout: 300
      stream_timeout: 60

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      rpm: 200
      timeout: 300
      stream_timeout: 60

  # Azure OpenAI (if configured)
  - model_name: azure-gpt-4
    litellm_params:
      model: azure/YOUR_DEPLOYMENT_NAME
      api_base: https://YOUR_RESOURCE.openai.azure.com/
      api_version: "2024-02-15"
      api_key: os.environ/AZURE_API_KEY

  # Anthropic Models
  - model_name: claude-3-opus
    litellm_params:
      model: anthropic/claude-3-opus-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-3-sonnet
    litellm_params:
      model: anthropic/claude-3-sonnet-20240229
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-3-haiku
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY

  # Groq (Fast Inference)
  - model_name: llama3-groq
    litellm_params:
      model: groq/llama3-8b-8192
      api_key: os.environ/GROQ_API_KEY

  # Embedding Models
  - model_name: text-embedding-3-small
    litellm_params:
      model: openai/text-embedding-3-small
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: embedding
      base_model: text-embedding-3-small

  - model_name: text-embedding-3-large
    litellm_params:
      model: openai/text-embedding-3-large
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      mode: embedding
      base_model: text-embedding-3-large

  # Image Generation
  - model_name: dall-e-3
    litellm_params:
      model: openai/dall-e-3
      api_key: os.environ/OPENAI_API_KEY

  # Wildcard Routing (Routes all models from these providers)
  - model_name: "openai/*"
    litellm_params:
      model: "openai/*"
      api_key: os.environ/OPENAI_API_KEY

  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      api_base: os.environ/OLLAMA_API_BASE

litellm_settings:
  drop_params: True
  modify_params: true
  num_retries: 5
  request_timeout: 600
  telemetry: False
  context_window_fallbacks: 
    - gpt-3.5-turbo: ["gpt-4", "gpt-4o"]

router_settings:
  routing_strategy: usage-based-routing-v2
  enable_pre_call_checks: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: True
  database_connection_pool_limit: 10

  # Optional: Pass-through endpoints for additional functionality
  # pass_through_endpoints:
