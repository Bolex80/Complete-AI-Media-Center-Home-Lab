services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    networks:
      - default
    restart: unless-stopped
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ./qdrant_data:/qdrant/storage

configs:
  qdrant_config:
    content: |
      log_level: INFO      

networks:
  default:
    name: bolex-net
    external: true
