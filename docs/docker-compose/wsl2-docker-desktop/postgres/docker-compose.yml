services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    networks:
      - bolex-net
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-YOUR_POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-YOUR_POSTGRES_PASSWORD}
      - POSTGRES_MULTIPLE_DATABASES=${POSTGRES_MULTIPLE_DATABASES:-litellm,n8n}
    volumes:
      - ./postgres_storage:/var/lib/postgresql/data
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -h localhost -U ${POSTGRES_USER:-postgres} -d postgres' ]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  bolex-net:
    external: true

volumes:
  postgres_storage:
    name: postgres_storage
