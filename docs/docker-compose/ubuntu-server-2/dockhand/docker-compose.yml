services:
  dockhand:
    image: fnsys/dockhand:latest
    container_name: dockhand-dockhand-1
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DATABASE_URL=postgres://dockhand:YOUR_PASSWORD@postgres:5432/dockhand
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
    networks:
      - dockhand

  postgres:
    image: postgres:16-alpine
    container_name: dockhand-postgres-1
    restart: unless-stopped
    volumes:
      - ./initdb:/docker-entrypoint-initdb.d
      - dockhand-pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=dockhand
      - POSTGRES_DB=dockhand
      - POSTGRES_PASSWORD=YOUR_PASSWORD    # CHANGE ME
    networks:
      - dockhand

networks:
  dockhand:
    name: dockhand_default

volumes:
  dockhand-pgdata: