# Koffan — Shopping list / CrowdSec companion app

services:
  koffan:
    image: ghcr.io/pansalut/koffan:latest
    container_name: koffan
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./shopping-data:/data
    environment:
      - PORT=80
      - DB_PATH=/data/shopping.db
      - LOGIN_MAX_ATTEMPTS=5
      - DISABLE_AUTH=true         # Set to false and configure auth for production
      - APP_ENV=production