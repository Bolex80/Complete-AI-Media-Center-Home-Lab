# Gastos Bentomo — Expense tracking web app
# 3-container pipeline: data-sync → processor → web

services:
  web:
    image: gastos-bentomo-web:latest
    container_name: gastos-web
    restart: unless-stopped
    ports:
      - "8885:80"

  processor:
    image: gastos-bentomo-processor:latest
    container_name: gastos-processor
    restart: unless-stopped

  data-sync:
    image: gastos-bentomo-data-sync:latest
    container_name: gastos-data-sync
    restart: unless-stopped

# Note: This project uses custom images built from source.
# See https://github.com/Bolex80/gastos-bentomo for build instructions.
# Environment variables (OneDrive sync URLs, etc.) should be in .env