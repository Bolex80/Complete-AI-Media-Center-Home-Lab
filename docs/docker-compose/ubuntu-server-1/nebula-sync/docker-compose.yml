# Nebula Sync — Pi-Hole configuration synchronization
# Syncs Pi-Hole config from primary (PiNet1) to replicas (Bentomo_Net, PiNet2)

services:
  nebula-sync:
    image: ghcr.io/lovelaze/nebula-sync:latest
    container_name: nebula-sync
    restart: unless-stopped
    environment:
      # Primary Pi-Hole (PiNet1)
      - PRIMARY=https://192.168.2.200:8443|${PIHOLE_PASSWORD}
      # Replicas (Bentomo_Net, PiNet2)
      - REPLICAS=https://192.168.2.201:5443|${PIHOLE_PASSWORD},https://192.168.2.205:8443|${PIHOLE_PASSWORD}
      # Sync settings
      - CRON=0 * * * *            # Every hour
      - FULL_SYNC=false
      - API_ENABLED=true
      - CLIENT_SKIP_TLS_VERIFICATION=true
      # What to sync
      - SYNC_GRAVITY_AD_LIST=true
      - SYNC_GRAVITY_CLIENT=true
      - SYNC_GRAVITY_DOMAIN_LIST=true
      - SYNC_GRAVITY_GROUP=true
      - SYNC_GRAVITY_DHCP_LEASES=true
      - SYNC_CONFIG_DATABASE=true
      - SYNC_CONFIG_MISC=true
      - SYNC_CONFIG_DHCP=true
      - SYNC_CONFIG_NTP=true
      - SYNC_CONFIG_RESOLVER=true
      # What NOT to sync
      - SYNC_CONFIG_DNS=false
      - SYNC_CONFIG_DEBUG=false
      - RUN_GRAVITY=false
      - TZ=Europe/Madrid